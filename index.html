<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Taller Cohen-Sutherland</title>

    <style>

        body{
            margin:0;
            padding:20px;
            background:#d6d6d6;
            font-family:Arial, sans-serif;
        }

        h1{
            text-align:center;
            margin-bottom:25px;
            color:#222;
        }

        #contenedor{
            display:flex;
            align-items:flex-start;
            gap:25px;
        }

        #canvas{
            display:block;
            background:white;
            border:3px solid #444;
            box-shadow:0px 0px 10px rgba(0,0,0,0.2);
        }

        #panel{
            width:250px;
            background:white;
            padding:15px;
            border-radius:10px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.15);
        }

        h2{
            margin-top:0;
            margin-bottom:10px;
            color:#333;
            border-bottom:1px solid #ccc;
            padding-bottom:5px;
        }

        .grupo{
            margin-bottom:20px;
        }

        .fila{
            margin-bottom:8px;
        }

        label{
            display:inline-block;
            width:30px;
            font-weight:bold;
        }

        input{
            width:70px;
            padding:4px;
            border:1px solid #999;
            border-radius:4px;
        }

        button{
            padding:8px 12px;
            border:none;
            border-radius:5px;
            background:#3b82f6;
            color:white;
            font-weight:bold;
            cursor:pointer;
        }

        button:hover{
            background:#2563eb;
        }

        #agregarBtn{
            width:100%;
            margin-top:10px;
        }

        #navegacion{
            display:flex;
            justify-content:center;
            gap:8px;
            margin-top:20px;
        }

        #info{
            margin-top:20px;
            background:#f3f3f3;
            padding:10px;
            border-radius:6px;
            min-height:70px;
        }

    </style>

</head>

<body>

    <h1>Algoritmo Cohen-Sutherland</h1>

    <div id="contenedor">

        <canvas id="canvas" width="700" height="500"></canvas>

        <div id="panel">

            <div class="grupo">

                <h2>Viewport</h2>

                <div class="fila">

                    <label>X1</label>
                    <input type="number" id="xmin">

                    <label>Y1</label>
                    <input type="number" id="ymin">

                </div>

                <div class="fila">

                    <label>X2</label>
                    <input type="number" id="xmax">

                    <label>Y2</label>
                    <input type="number" id="ymax">

                </div>

            </div>

            <div class="grupo">

                <h2>Línea</h2>

                <div class="fila">

                    <label>X1</label>
                    <input type="number" id="x1">

                    <label>Y1</label>
                    <input type="number" id="y1">

                </div>

                <div class="fila">

                    <label>X2</label>
                    <input type="number" id="x2">

                    <label>Y2</label>
                    <input type="number" id="y2">

                </div>

            </div>

            <button id="agregarBtn">
                Actualizar
            </button>

            <div id="info"></div>

            <div id="navegacion">

                <button id="primeroBtn">|&lt;</button>

                <button id="anteriorBtn">&lt;</button>

                <button id="siguienteBtn">&gt;</button>

                <button id="ultimoBtn">&gt;|</button>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
