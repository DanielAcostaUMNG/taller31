<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>TALLER 3.1 COHEN-SUTHERLAND</title>

    <style>

        body{
            margin:0;
            padding:20px;
            background:#dcdcdc;
            font-family:Arial;
        }

        h1{
            margin-bottom:20px;
        }

        #contenedor{
            display:flex;
            gap:20px;
        }

        #canvas{
            background:#eeeeee;
            border:1px solid gray;
        }

        #panel{
            width:220px;
        }

        input{
            width:50px;
            margin:2px;
        }

        button{
            margin-top:5px;
            padding:5px 10px;
        }

        #navegacion{
            margin-top:20px;
        }

    </style>

</head>

<body>

    <h1>Algoritmo Cohen-Sutherland</h1>

    <div id="contenedor">

        <canvas id="canvas" width="700" height="500"></canvas>

        <div id="panel">

            <h2>Ventana de recorte</h2>

            <div>
                x1 <input type="number" id="xmin">
                y1 <input type="number" id="ymin">
            </div>

            <div>
                x2 <input type="number" id="xmax">
                y2 <input type="number" id="ymax">
            </div>

            <h2>Línea</h2>

            <div>
                x1 <input type="number" id="x1">
                y1 <input type="number" id="y1">
            </div>

            <div>
                x2 <input type="number" id="x2">
                y2 <input type="number" id="y2">
            </div>

            <button id="agregarBtn">Actualizar</button>

            <div id="info"></div>

            <div id="navegacion">

                <button id="primeroBtn">|&lt;</button>

                <button id="anteriorBtn">&lt;</button>

                <button id="siguienteBtn">&gt;</button>

                <button id="ultimoBtn">&gt;|</button>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
